services:
  whisper-not:
    image: ${WHISPER_IMAGE:-ghcr.io/alienvsrobot/whisper_not:cuda}
    container_name: ${WHISPER_CONTAINER_NAME:-whisper-not}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-TheChola/whisper-large-v3-turbo-german-faster-whisper}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      WHISPER_THREADS: ${WHISPER_THREADS:-4}
      WHISPER_BEAM: ${WHISPER_BEAM:-5}
      WHISPER_API_KEY: ${WHISPER_API_KEY:?Set WHISPER_API_KEY}
      WHISPER_DIARIZATION: ${WHISPER_DIARIZATION:-on_demand}
      WHISPER_WORD_TIMESTAMPS: "false"
      WHISPER_MAX_UPLOAD_MB: ${WHISPER_MAX_UPLOAD_MB:-1024}
      WHISPER_LOG_LEVEL: ${WHISPER_LOG_LEVEL:-INFO}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "${WHISPER_HOST_PORT:-9000}:9000"
    volumes:
      - whisper-not-data:/var/lib/whisper
    tmpfs:
      - /run/whisper-temp:size=2g,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10m

volumes:
  whisper-not-data:
    name: whisper-not-data
