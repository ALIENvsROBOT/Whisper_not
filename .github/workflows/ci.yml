name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/base.txt httpx

      - name: Run unit and API compatibility tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q src/whisper_not

      - name: Check shell scripts
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          shellcheck scripts/container-entrypoint.sh scripts/whisper-manage.sh

      - name: Validate Compose configurations
        env:
          WHISPER_API_KEY: ci-test-key
        run: |
          docker compose -f deploy/compose.cuda.yml config --quiet
          docker compose -f deploy/compose.cuda-cdi.yml config --quiet

      - name: Validate workflow definitions
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cpu
          push: false
          tags: whisper-not:test
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      - name: Build CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cuda
          platforms: linux/amd64
          push: false
          tags: whisper-not:cuda-test
          cache-from: type=gha,scope=cuda
          cache-to: type=gha,mode=max,scope=cuda
